name: Lint
on: pull_request
jobs:
  statix:
    if: ${{ false }} # TODO: Wait for pipe operator statix support (https://github.com/oppiliappan/statix/issues/139)
    name: Lint checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v17
        with:
          name: statix
      - uses: jocelynthode/statix-action@master
