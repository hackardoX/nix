repository:
  # See https://developer.github.com/v3/repos/#edit for all available settings.

  # The name of the repository. Changing this will rename the repository
  name: nix
  # A short description of the repository that will show up on GitHub
  description: A repository containing my configuration for nix
  # A URL with more information about the repository
  homepage: "https://techtonic.ltd"
  # A comma-separated list of topics to set on the repository
  topics: "nix-darwin,unstable,snowfall,flake,flakes"
  # Either `true` to make the repository private, or `false` to make it public.
  private: false
  # Either `true` to enable issues for this repository, `false` to disable them.
  has_issues: true
  # Either `true` to enable projects for this repository, or `false` to disable them.
  # If projects are disabled for the organization, passing `true` will cause an API error.
  has_projects: true
  # Either `true` to enable the wiki for this repository, `false` to disable it.
  has_wiki: true
  # Either `true` to enable downloads for this repository, `false` to disable them.
  has_downloads: false
  # Updates the default branch for this repository.
  default_branch: main
  # Either `true` to allow squash-merging pull requests, or `false` to prevent
  # squash-merging.
  allow_squash_merge: true
  # Either `true` to allow merging pull requests with a merge commit, or `false`
  # to prevent merging pull requests with merge commits.
  allow_merge_commit: false
  # Either `true` to allow rebase-merging pull requests, or `false` to prevent
  # rebase-merging.
  allow_rebase_merge: true
  # Either `true` to enable automatic deletion of branches on merge, or `false` to disable
  delete_branch_on_merge: true
  # Either `true` to enable automated security fixes, or `false` to disable
  # automated security fixes.
  enable_automated_security_fixes: true
  # Either `true` to enable vulnerability alerts, or `false` to disable
  # vulnerability alerts.
  enable_vulnerability_alerts: true
# Labels: define labels for Issues and Pull Requests
#
labels: null
# NOTE: leave that up to the https://github.com/numtide/.github repo
#   - name: bug
#     color: CC0000
#     description: An issue with the system 🐛.
#
#   - name: feature
#     # If including a `#`, make sure to wrap it with quotes!
#     color: '#336699'
#     description: New functionality.
#
#   - name: Help Wanted
#     # Provide a new name to rename an existing label
#     new_name: first-timers-only
#
# Milestones: define milestones for Issues and Pull Requests
milestones: null
#   - title: milestone-title
#     description: milestone-description
#     # The state of the milestone. Either `open` or `closed`
#     state: open

# Collaborators: give specific users access to this repository.
# See https://docs.github.com/en/rest/reference/repos#add-a-repository-collaborator for available options
collaborators: null
# Note: `permission` is only valid on organization-owned repositories.
# The permission to grant the collaborator. Can be one of:
# * `pull` - can pull, but not push to or administer this repository.
# * `push` - can pull and push, but not administer this repository.
# * `admin` - can pull, push and administer this repository.
# * `maintain` - Recommended for project managers who need to manage the repository without access to sensitive or destructive actions.
# * `triage` - Recommended for contributors who need to proactively manage issues and pull requests without write access.
# permission: push

# See https://docs.github.com/en/rest/reference/teams#add-or-update-team-repository-permissions for available options
teams: null
# The permission to grant the team. Can be one of:
# * `pull` - can pull, but not push to or administer this repository.
# * `push` - can pull and push, but not administer this repository.
# * `admin` - can pull, push and administer this repository.
# * `maintain` - Recommended for project managers who need to manage the repository without access to sensitive or destructive actions.
# * `triage` - Recommended for contributors who need to proactively manage issues and pull requests without write access.
# permission: maintain
rulesets:
  # Prevent force-pushes and deletion of the default branch
  - name: protect main - no destruction
    target: branch
    enforcement: active
    conditions:
      ref_name:
        include:
          - "~DEFAULT_BRANCH"
        exclude: []
    rules:
      # Prevent branch deletion
      - type: deletion
      # Prevent force-pushes (non-fast-forward)
      - type: non_fast_forward
      # Require a linear commit history (no merge commits)
      - type: required_linear_history
  # Require all status checks to pass before merging
  - name: protect main - status checks
    target: branch
    enforcement: active
    conditions:
      ref_name:
        include:
          - "~DEFAULT_BRANCH"
        exclude: []
    rules:
      - type: required_status_checks
        parameters:
          # Require branches to be up to date before merging
          strict_required_status_checks_policy: true
          required_status_checks:
            - context: "Build on macos-latest"
            - context: "Flake checks on aarch64-darwin"
            - context: "Dead code analysis"
            - context: "Formatting checks"
            - context: "Lint checks"
  # Require at least one approving review before merging.
  # Admins (i.e. you) are exempt so your own PRs are never blocked.
  - name: protect main - require review
    target: branch
    enforcement: active
    conditions:
      ref_name:
        include:
          - "~DEFAULT_BRANCH"
        exclude: []
    rules:
      - type: pull_request
        parameters:
          # Require at least one approving review
          required_approving_review_count: 1
          # Block merge until code owners have reviewed
          require_code_owner_review: true
          # Dismiss approvals when new commits are pushed
          dismiss_stale_reviews_on_push: true
          # All review threads must be resolved before merging
          required_review_thread_resolution: true
          # Prevents requiring approval from someone other
          # than the last person to push.
          require_last_push_approval: true
    bypass_actors:
      # actor_id 5 = Admin repository role.
      # bypass_mode: always means the review requirement is skipped when
      # merging PRs — use "pull_request" if you only want to bypass direct pushes.
      - actor_id: 5
        actor_type: RepositoryRole
        bypass_mode: always
